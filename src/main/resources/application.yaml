spring:
  application:
    name: tp1
  
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  cache:
    type: redis
    redis:
      time-to-live: 60s
  data:
    redis:
      host: localhost
      port: 6379

  elasticsearch:
    uris: http://localhost:9200
